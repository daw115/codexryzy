services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build:
      context: ./worker
    env_file: .env
    depends_on:
      - postgres
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: meeting_brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./vector-db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  vector-db:
    image: pgvector/pgvector:pg16
    command: ["bash", "-lc", "echo 'Use postgres service for vector DB; this container is a placeholder for architecture parity.' && sleep infinity"]
    profiles: ["optional"]

volumes:
  pgdata:
