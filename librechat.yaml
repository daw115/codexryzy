version: 1.3.8

cache: true

interface:
  artifacts: true
  memory: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

endpoints:

  # ── Anthropic (native format via Quatarly reverse proxy) ──────────────────
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
    titleConvo: true
    titleModel: "claude-sonnet-4-6"
    summarize: false
    summaryModel: "claude-sonnet-4-6"
    forcePrompt: false
    dropParams:
      - "stop"
      - "user"
      - "frequency_penalty"
      - "presence_penalty"

  custom:

    # ── Quatarly (OpenAI-compatible — all models) ───────────────────────────
    - name: "Quatarly"
      apiKey: "${ANTHROPIC_API_KEY}"
      baseURL: "https://api.quatarly.cloud/v1"
      models:
        default:
          - claude-opus-4-6
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
          - claude-opus-4-6-thinking
          - claude-sonnet-4-6-thinking
          - gemini-3.1-pro
          - gemini-3-flash
          - gpt-5
          - gpt-5-mini
        fetch: false
      titleConvo: true
      titleModel: "claude-sonnet-4-6"
      summarize: false
      summaryModel: "claude-sonnet-4-6"
      forcePrompt: false
      modelDisplayLabel: "Quatarly"
      dropParams:
        - "user"

    # ── n8n Automation (bridge workflow — OpenAI-compatible) ────────────────
    # Set N8N_WEBHOOK_BASE in Railway env vars after n8n is deployed.
    # Example: N8N_WEBHOOK_BASE=https://n8n-production-xxxx.up.railway.app
    - name: "n8n Automation"
      apiKey: "n8n-no-auth"
      baseURL: "${N8N_WEBHOOK_BASE}/webhook"
      models:
        default:
          - librechat-bridge
        fetch: false
      titleConvo: false
      forcePrompt: false
      modelDisplayLabel: "n8n"
      dropParams:
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "stop"
