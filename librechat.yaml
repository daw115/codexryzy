version: 1.1.4

cache: true

interface:
  artifacts: true
  memory: true
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

endpoints:

  # Native Anthropic format — routed through Quatarly via ANTHROPIC_REVERSE_PROXY
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
    titleConvo: true
    titleModel: "claude-sonnet-4-6"
    summarize: false
    summaryModel: "claude-sonnet-4-6"
    forcePrompt: false
    dropParams:
      - "stop"
      - "user"
      - "frequency_penalty"
      - "presence_penalty"

  # OpenAI-compatible path — all models via Quatarly
  custom:
    - name: "Quatarly"
      apiKey: "${ANTHROPIC_API_KEY}"
      baseURL: "https://api.quatarly.cloud/v1"
      models:
        default:
          - claude-opus-4-6
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
          - claude-opus-4-6-thinking
          - claude-sonnet-4-6-thinking
          - gemini-3.1-pro
          - gemini-3-flash
          - gpt-5
          - gpt-5-mini
        fetch: false
      titleConvo: true
      titleModel: "claude-sonnet-4-6"
      summarize: false
      summaryModel: "claude-sonnet-4-6"
      forcePrompt: false
      modelDisplayLabel: "Quatarly"
      dropParams:
        - "user"
